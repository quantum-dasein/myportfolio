<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!--
    RB monogram favicon — replaces the default Astro logo.
    The brand mark is detailed chrome with transparency, which turns to mush at
    16px, so this is a tab-legible reduction of it: the ring + the RB, on the
    site's own ink black. Solid background keeps it readable on both light and
    dark browser chrome.
  -->
  <defs>
    <linearGradient id="chrome" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="38%" stop-color="#dfe4ea"/>
      <stop offset="52%" stop-color="#8d949c"/>
      <stop offset="66%" stop-color="#e6eaef"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
  </defs>

  <rect width="64" height="64" rx="14" fill="#050505"/>
  <circle cx="32" cy="32" r="25" fill="none" stroke="url(#chrome)" stroke-width="2.6" opacity="0.9"/>

  <text
    x="32" y="33"
    text-anchor="middle"
    dominant-baseline="central"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="30"
    font-weight="700"
    letter-spacing="-1.5"
    fill="url(#chrome)">RB</text>
</svg>
